services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - db-data:/app/data
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    env_file: .env
    depends_on:
      - app

volumes:
  db-data:
  caddy-data:
  caddy-config:
